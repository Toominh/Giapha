<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gia Phả Thông Minh - Cập Nhật 2024</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --container-bg: #1e293b;
            --text-color: #f8fafc;
            --primary-color: #0ea5e9;
            --border-color: #334155;
            --tree-line: #64748b;
            --male-bg: #1e3a8a;
            --male-border: #3b82f6;
            --female-bg: #701a75;
            --female-border: #d946ef;
            --wife1-border: #f97316;
            --wife-other-border: #64748b;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0; padding-bottom: 100px;
            font-size: 16px;
            /* Thiết lập con trỏ mặc định là bàn tay mở */
            cursor: grab;
            overflow: hidden; /* Ẩn thanh cuộn mặc định để dùng kéo thả */
            height: 100vh;
        }

        /* Khi đang nhấn giữ chuột để kéo */
        body:active { cursor: grabbing; }

        header {
            text-align: center;
            padding: 30px;
            background: linear-gradient(to bottom, #1e293b, var(--bg-color));
            user-select: none; /* Tránh bôi đen chữ khi đang kéo */
        }
        
        h1 { font-size: 32px; margin: 0; color: var(--primary-color); text-shadow: 0 2px 4px rgba(0,0,0,0.3); }

        /* Vùng chứa sơ đồ cho phép kéo thả */
        main { 
            display: block; 
            text-align: center; 
            padding: 60px; 
            height: calc(100vh - 180px);
            overflow: auto; /* Vẫn giữ auto để hoạt động kéo thả */
            scrollbar-width: none; /* Ẩn thanh cuộn trên Firefox */
        }
        main::-webkit-scrollbar { display: none; } /* Ẩn thanh cuộn trên Chrome/Safari */

        .tree { display: inline-block; margin: 0 auto; text-align: left; user-select: none; }
        .tree ul { display: flex; position: relative; padding: 35px 0 0 0; justify-content: center; margin: 0; }
        .tree li { text-align: center; list-style-type: none; position: relative; padding: 25px 10px 0 10px; }
        
        .tree li::before, .tree li::after {
            content: ''; position: absolute; top: 0; right: 50%;
            border-top: 2px solid var(--tree-line); width: 50%; height: 25px;
        }
        .tree li::after { right: auto; left: 50%; border-left: 2px solid var(--tree-line); }
        .tree li:only-child::after, .tree li:only-child::before { display: none; }
        .tree li:only-child { padding-top: 0; }
        .tree li:first-child::before, .tree li:last-child::after { border: 0 none; }
        .tree li:last-child::before { border-right: 2px solid var(--tree-line); border-radius: 0 6px 0 0; }
        .tree li:first-child::after { border-radius: 6px 0 0 0; }
        
        .tree ul ul::before {
            content: ''; position: absolute; top: 0; left: 50%;
            border-left: 2px solid var(--tree-line); width: 0; height: 35px;
        }

        .family-group {
            position: relative; display: inline-flex; flex-direction: column;
            align-items: center; padding: 25px 15px 15px 15px; z-index: 1; margin-top: 5px;
        }

        .family-group::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0;
            height: 220px; border: 2px dashed var(--tree-line);
            border-radius: 16px; background: rgba(30, 41, 59, 0.5); z-index: -1;
        }

        .husband-row { position: relative; margin-bottom: 25px; z-index: 2; }
        .husband-row::after {
            content: ''; position: absolute; bottom: -25px; left: 50%;
            border-left: 2px dashed var(--tree-line); height: 25px;
            transform: translateX(-50%); z-index: -1;
        }

        .wives-row { display: flex; justify-content: center; padding: 0 !important; margin: 0; position: relative; z-index: 2; }
        .tree ul.wives-row::before { display: none !important; }
        .tree ul.wives-row > li { padding-top: 25px !important; }

        .person-container { position: relative; display: inline-block; z-index: 5; }
        .person-box {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 12px 15px; background: var(--container-bg); border: 2px solid var(--border-color);
            border-radius: 12px; min-width: 150px; position: relative; z-index: 2;
            box-shadow: 0 6px 12px -2px rgba(0, 0, 0, 0.4);
        }
        
        .person { padding: 6px 14px; border-radius: 6px; font-size: 16px; font-weight: 700; white-space: nowrap; margin-bottom: 4px; }
        .dates { font-size: 13px; opacity: 0.9; font-weight: 400; color: #cbd5e1; }
        
        .male { background: var(--male-bg); border: 1px solid var(--male-border); }
        .female { background: var(--female-bg); border: 1px solid var(--female-border); }
        
        .wife-label {
            position: absolute; top: -14px; left: 50%; transform: translateX(-50%);
            background: var(--bg-color); padding: 4px 10px; border-radius: 6px;
            font-size: 12px; font-weight: bold; border: 1px solid currentColor; z-index: 10;
        }

        .toggle-btn {
            position: absolute; bottom: -14px; left: 50%; transform: translateX(-50%);
            width: 26px; height: 26px; background: #ffffff !important;
            color: #000 !important; border: 2px solid #94a3b8;
            border-radius: 50%; font-size: 18px; font-weight: bold; cursor: pointer;
            display: flex; align-items: center; justify-content: center; z-index: 10;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }

        footer { position: fixed; bottom: 0; width: 100%; background: var(--container-bg); padding: 15px; text-align: center; border-top: 1px solid var(--border-color); z-index: 100; cursor: default; }
        button.update-btn { background: var(--primary-color); color: #fff; border: none; padding: 12px 28px; border-radius: 8px; font-weight: bold; font-size: 16px; cursor: pointer; }
        
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 1000; justify-content: center; align-items: center; backdrop-filter: blur(4px); cursor: default; }
        .modal-content { background: var(--container-bg); padding: 30px; border-radius: 15px; width: 90%; max-width: 800px; }
        textarea { width: 100%; height: 350px; background: #0f172a; color: #10b981; border: 1px solid var(--border-color); padding: 15px; font-size: 16px; margin: 15px 0; border-radius: 8px; box-sizing: border-box; }
    </style>
</head>
<body>

<header><h1>GIA PHẢ PHÂN NHÁNH VỢ CON</h1></header>

<main id="scrollContainer"><div id="treeContainer" class="tree"></div></main>

<footer><button class="update-btn" onclick="openModal()">Cập Nhật Dữ Liệu</button></footer>

<div class="modal-overlay" id="modal">
    <div class="modal-content">
        <h2>Nhập dữ liệu</h2>
        <textarea id="dataInput"></textarea>
        <div style="text-align: right;">
            <button class="update-btn" onclick="closeModal()" style="background:#475569; margin-right:10px;">Hủy</button>
            <button class="update-btn" onclick="saveData()">Cập Nhật</button>
        </div>
    </div>
</div>

<script>
    const input = document.getElementById('dataInput');
    const container = document.getElementById('treeContainer');
    const modal = document.getElementById('modal');
    const scrollContainer = document.getElementById('scrollContainer');

    // --- Tính năng kéo thả bàn tay ---
    let isDown = false;
    let startX;
    let startY;
    let scrollLeft;
    let scrollTop;

    scrollContainer.addEventListener('mousedown', (e) => {
        isDown = true;
        scrollContainer.classList.add('active');
        startX = e.pageX - scrollContainer.offsetLeft;
        startY = e.pageY - scrollContainer.offsetTop;
        scrollLeft = scrollContainer.scrollLeft;
        scrollTop = scrollContainer.scrollTop;
    });
    scrollContainer.addEventListener('mouseleave', () => { isDown = false; });
    scrollContainer.addEventListener('mouseup', () => { isDown = false; });
    scrollContainer.addEventListener('mousemove', (e) => {
        if (!isDown) return;
        e.preventDefault();
        const x = e.pageX - scrollContainer.offsetLeft;
        const y = e.pageY - scrollContainer.offsetTop;
        const walkX = (x - startX) * 2; // Tốc độ kéo
        const walkY = (y - startY) * 2;
        scrollContainer.scrollLeft = scrollLeft - walkX;
        scrollContainer.scrollTop = scrollTop - walkY;
    });

    // --- Logic Gia Phả ---
    const defaultData = `Nguyễn Văn (Nam)
+ Nguyễn Thị (Nữ)
    Nguyễn Lữ (Nữ)
    Nguyễn Hai (Nam)
+ Nguyễn Lẽ (Nữ)
    Nguyễn Ba (Nam)
    + Lê Thị
    + Trương Thị
        Nguyễn Kim
        Nguyễn Cường
        + Nguyễn Hà
            Nguyễn Trọng
    + Kiều Thị
        Nguyễn Nhạc
        Nguyễn Dữ
    Nguyễn Tư (Nữ)
        Phạm Văn (Nam)
        Phạm Hùng (Nam)
Nguyễn Tuấn (Nam)
+ Trần Thị (Nữ)
+ Lê Thị (Nữ)
    Nguyễn Huệ (Nam)`;

    input.value = defaultData;

    function parseLine(line) {
        let text = line.trim();
        let isWife = text.startsWith('+');
        if (isWife) text = text.substring(1).trim();
        let dateMatch = text.match(/\((\d{4}\s*-\s*\d{4})\)/) || text.match(/\((\d{4}\s*-\s*)\)/);
        let dates = dateMatch ? dateMatch[1] : "";
        let gender = text.toLowerCase().includes('(nữ)') ? 'female' : 'male';
        let name = text.replace(/\(\d{4}\s*-\s*\d*\)/g, "").replace(/\(nam\)|\(nữ\)/gi, "").trim();
        return { name, dates, gender, isWife };
    }

    function buildTree(lines) {
        let roots = [], stack = [];
        lines.forEach(line => {
            if (!line.trim()) return;
            let indent = 0;
            let match = line.match(/^\s*/)[0];
            for(let c of match) indent += (c === '\t' ? 4 : 1);
            let node = { ...parseLine(line), children: [] };
            while (stack.length > 0 && stack[stack.length - 1].indent >= indent) {
                if (node.isWife && stack[stack.length - 1].indent === indent && !stack[stack.length - 1].node.isWife) break;
                stack.pop();
            }
            if (stack.length > 0) stack[stack.length - 1].node.children.push(node);
            else roots.push(node);
            stack.push({ node, indent });
        });
        return roots;
    }

    function toggleChildren(btn) {
        const childContainer = btn.parentElement.nextElementSibling;
        if (childContainer && childContainer.classList.contains('children-container')) {
            const isHidden = childContainer.style.display === 'none';
            childContainer.style.display = isHidden ? 'block' : 'none';
            btn.innerText = isHidden ? '-' : '+';
        }
    }

    function createPersonBox(node, isWife = false, label = "", hasChildren = false) {
        let html = `<div class="person-container">`;
        let borderStyle = "";
        let labelHtml = "";
        if (isWife) {
            let color = label === "Bạn đời 1" ? "var(--wife1-border)" : "var(--wife-other-border)";
            borderStyle = `border: 2px dashed ${color}; ${label !== "Bạn đời 1" ? "opacity: 0.85;" : ""}`;
            labelHtml = `<span class="wife-label" style="color: ${color};">${label}</span>`;
        }
        html += `<div class="person-box" style="${borderStyle}">
                    ${labelHtml}
                    <div class="person ${node.gender}">${node.name}</div>
                    ${node.dates ? `<div class="dates">${node.dates}</div>` : ""}
                 </div>`;
        if (hasChildren) html += `<button class="toggle-btn" onclick="toggleChildren(this)">-</button>`;
        html += `</div>`;
        return html;
    }

    function renderHTML(nodes, isRoot = false) {
        if (!nodes || !nodes.length) return "";
        let html = `<ul ${isRoot ? "style='padding-top:0;'" : ""}>`;
        nodes.forEach(node => {
            if (node.isWife) return;
            let wives = node.children.filter(c => c.isWife);
            let directChildren = node.children.filter(c => !c.isWife);
            html += `<li>`;
            if (wives.length > 0) {
                html += `<div class="family-group"><div class="husband-row">`;
                html += createPersonBox(node, false, "", directChildren.length > 0);
                if (directChildren.length > 0) {
                    html += `<div class="children-container" style="position:absolute; top:100%; left:50%; transform:translateX(-50%); z-index:10;">${renderHTML(directChildren)}</div>`;
                }
                html += `</div><ul class="wives-row">`;
                wives.forEach((wife, idx) => {
                    html += `<li>${createPersonBox(wife, true, "Bạn đời " + (idx+1), wife.children.length > 0)}`;
                    if (wife.children.length > 0) html += `<div class="children-container">${renderHTML(wife.children)}</div>`;
                    html += `</li>`;
                });
                html += `</ul></div>`;
            } else {
                html += createPersonBox(node, false, "", directChildren.length > 0);
                if (directChildren.length > 0) html += `<div class="children-container">${renderHTML(directChildren)}</div>`;
            }
            html += `</li>`;
        });
        return html + "</ul>";
    }

    function openModal() { modal.style.display = 'flex'; }
    function closeModal() { modal.style.display = 'none'; }
    function saveData() {
        container.innerHTML = renderHTML(buildTree(input.value.split('\n')), true);
        closeModal();
    }
    saveData();
</script>
</body>
</html>
